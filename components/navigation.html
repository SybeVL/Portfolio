        <script defer data-name="navigation-logic">
          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const navToggle = document.getElementById("navToggle")
              const navClose = document.getElementById("navClose")
              const mobileOverlay = document.getElementById("mobileOverlay")
              const navLinks = document.querySelectorAll(".navigation-mobile-link")

              const openMenu = () => {
                mobileOverlay.classList.add("is-active")
                navToggle.setAttribute("aria-expanded", "true")
                document.body.style.overflow = "hidden"
              }

              const closeMenu = () => {
                mobileOverlay.classList.remove("is-active")
                navToggle.setAttribute("aria-expanded", "false")
                document.body.style.overflow = ""
              }

              navToggle.addEventListener("click", openMenu)
              navClose.addEventListener("click", closeMenu)

              navLinks.forEach((link) => {
                link.addEventListener("click", closeMenu)
              })

              let lastScroll = 0
              const navWrapper = document.querySelector(".navigation-outer-wrapper")

              window.addEventListener("scroll", () => {
                const currentScroll = window.pageYOffset

                if (currentScroll <= 0) {
                  navWrapper.style.transform = "translateY(0)"
                  return
                }

                if (currentScroll > lastScroll && currentScroll > 100) {
                  navWrapper.style.transform = "translateY(-100%)"
                } else {
                  navWrapper.style.transform = "translateY(0)"
                }

                lastScroll = currentScroll
              })
            })()
          });
        </script>
      </div>
